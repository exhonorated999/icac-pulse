appId: com.icac.pulse
productName: ICAC P.U.L.S.E.
copyright: Copyright © 2025 Intellect LE, LLC
directories:
  output: dist
  buildResources: build
files:
  - out
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64
    - target: portable
      arch:
        - x64
  signAndEditExecutable: false
  icon: build/icon.ico
  publisherName: Intellect LE, LLC
  verifyUpdateCodeSignature: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ICAC P.U.L.S.E.
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  perMachine: true
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  license: LICENSE.txt
  artifactName: ${productName}-${version}-Setup.${ext}
  include: build/installer.nsh
msi:
  oneClick: false
  perMachine: true
  runAfterFinish: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  artifactName: ${productName}-${version}-Setup.${ext}
  shortcutName: ICAC P.U.L.S.E.
  warningsAsErrors: false
portable:
  artifactName: ${productName}-${version}-Portable.${ext}
publish: null
